<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BossyProxy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header-container">
            <h1>BossyProxy</h1>
            <img src="/static/Img/Logo.png" alt="BossyProxy Logo" class="logo">
        </div>
        
        <div class="search-box">
            <input type="text" id="url" placeholder="Enter URL (e.g., google.com)">
            <button onclick="send()">Submit</button>
        </div>

        <div id="box"></div>
    </div>

    <script>
        async function send() {
            const urlInput = document.getElementById("url");
            const box = document.getElementById("box");
            const url = urlInput.value;

            if (!url) return;

            box.innerHTML = "<p style='color: #7c7c8a; text-align: center;'>Loading content...</p>";

            try {
                const res = await fetch("/browse?url=" + encodeURIComponent(url), {
                    method: "GET"
                });

                const text = await res.text();
                box.innerHTML = text;
            } catch (err) {
                box.innerHTML = "<p style='color: #ff3333; text-align: center;'>Error fetching resource.</p>";
            }
        }

        document.getElementById("url").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                send();
            }
        });

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 60;
        const connectionDistance = 120;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 165, 0, 0.5)';
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        const alpha = (1 - dist / connectionDistance) * 0.15;
                        ctx.strokeStyle = `rgba(255, 165, 0, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
